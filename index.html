<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Tauritube</title><link rel="stylesheet" href="/src/styles.css" /><style>#chrome > #brand{width:170px;height:auto}</style></head>
  <body class="browsing"><main><div id="reveal-zone" aria-hidden="true"></div><header id="chrome"><button id="brand" aria-label="Open navigation"><img src="/src/youtube-icon.png" alt="" /><strong>YouTube Tauri</strong></button><button id="back" aria-label="Back to results">←</button><input id="query" autocomplete="off" placeholder="Search YouTube or paste a URL" /><button id="clear" aria-label="Clear search">×</button><button id="go">Search</button><button id="queue" aria-label="Show queue">Queue <span id="queue-count">0</span></button><button id="prev-page" aria-label="Previous results page">‹</button><span id="status"></span><button id="next-page" aria-label="Next results page">›</button><button id="minimize" aria-label="Minimize">−</button><button id="close" aria-label="Hide">×</button></header><section id="stage"><div id="empty"><b>Search YouTube</b><span>Type what you want to watch, or paste a YouTube URL.</span><small>Shift+X disables all player input. Press it again to restore input.</small></div></section></main><script type="module" src="/src/main.ts"></script></body>
</html>
