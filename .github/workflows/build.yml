name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  tauri:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact: tauritube-windows-x64
          - name: Linux x64
            runner: ubuntu-24.04
            artifact: tauritube-linux-x64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact: tauritube-linux-arm64
          - name: macOS x64
            runner: macos-15-intel
            artifact: tauritube-macos-x64
          - name: macOS arm64
            runner: macos-14
            artifact: tauritube-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect release files
        shell: pwsh
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          $out = "release/$env:ARTIFACT"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $patterns = @(
            "src-tauri/target/release/tauritube.exe",
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe",
            "src-tauri/target/release/bundle/deb/*.deb",
            "src-tauri/target/release/bundle/rpm/*.rpm",
            "src-tauri/target/release/bundle/appimage/*.AppImage",
            "src-tauri/target/release/bundle/dmg/*.dmg",
            "src-tauri/target/release/bundle/**/latest.json",
            "src-tauri/target/release/bundle/**/*.sig"
          )
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              $name = if ($_.Name -eq 'latest.json') { "$env:ARTIFACT-latest.json" } else { $_.Name }
              Copy-Item -LiteralPath $_.FullName -Destination "$out/$name" -Force
            }
          }
          Get-ChildItem -Path "src-tauri/target/release/bundle/macos/*.app" -Directory -ErrorAction SilentlyContinue | ForEach-Object {
            Compress-Archive -Path $_.FullName -DestinationPath "$out/Tauritube_$($env:ARTIFACT -replace '^tauritube-', '').app.zip" -Force
          }

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: tauri
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Combine updater manifests
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path release-artifacts -Filter '*-latest.json'
          if (!$files) { throw 'No updater manifests were produced' }
          $manifest = $null
          foreach ($file in $files) {
            $current = Get-Content -LiteralPath $file.FullName -Raw | ConvertFrom-Json
            if ($null -eq $manifest) { $manifest = $current; continue }
            $current.platforms.PSObject.Properties | ForEach-Object { $manifest.platforms | Add-Member -NotePropertyName $_.Name -NotePropertyValue $_.Value -Force }
          }
          $manifest | ConvertTo-Json -Depth 12 | Set-Content -LiteralPath release-artifacts/latest.json -Encoding utf8

      - name: Move latest tag
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push -f origin latest

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest build
          body: Automated build from `${{ github.sha }}`.
          artifacts: release-artifacts/*
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
