name: Build Tauritube

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
          - name: Linux x64
            runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macOS x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - name: macOS arm64
            runner: macos-14
            target: aarch64-apple-darwin

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' src-tauri/Cargo.toml | head -1)"
          if [ "$version" != "$tauri_version" ] || [ "$version" != "$cargo_version" ]; then
            echo "Version mismatch: package=$version tauri=$tauri_version cargo=$cargo_version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.release.outputs.version }}
          releaseName: Tauritube v${{ steps.release.outputs.version }}
          releaseBody: Automated build from ${{ github.sha }}.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload portable executable
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: |
          exe="$(find "src-tauri/target/${{ matrix.target }}/release" -maxdepth 1 -type f -name 'tauritube.exe' | head -1)"
          if [ -n "$exe" ]; then gh release upload "v${{ steps.release.outputs.version }}" "$exe#tauritube.exe" --clobber; fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
