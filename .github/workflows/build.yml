name: Build

on:
  push:
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  tauri:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact: tauritube-windows-x64
          - name: Linux x64
            runner: ubuntu-24.04
            artifact: tauritube-linux-x64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            artifact: tauritube-linux-arm64
          - name: macOS x64
            runner: macos-15-intel
            artifact: tauritube-macos-x64
          - name: macOS arm64
            runner: macos-14
            artifact: tauritube-macos-arm64

    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release version
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $expected = $env:RELEASE_TAG -replace '^v', ''
          $packageVersion = (Get-Content -LiteralPath package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content -LiteralPath src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = ((Select-String -LiteralPath src-tauri/Cargo.toml -Pattern '^version = "(.+)"').Matches[0].Groups[1].Value)
          if ($packageVersion -ne $expected -or $tauriVersion -ne $expected -or $cargoVersion -ne $expected) { throw "Release tag $env:RELEASE_TAG does not match application version $packageVersion / $tauriVersion / $cargoVersion" }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect release files
        shell: pwsh
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          $out = "release/$env:ARTIFACT"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $patterns = @(
            "src-tauri/target/release/tauritube.exe",
            "src-tauri/target/release/bundle/msi/*.msi",
            "src-tauri/target/release/bundle/nsis/*.exe",
            "src-tauri/target/release/bundle/deb/*.deb",
            "src-tauri/target/release/bundle/rpm/*.rpm",
            "src-tauri/target/release/bundle/appimage/*.AppImage",
            "src-tauri/target/release/bundle/appimage/*.AppImage.sig",
            "src-tauri/target/release/bundle/dmg/*.dmg",
            "src-tauri/target/release/bundle/macos/*.tar.gz",
            "src-tauri/target/release/bundle/macos/*.tar.gz.sig",
            "src-tauri/target/release/bundle/msi/*.msi.sig",
            "src-tauri/target/release/bundle/nsis/*.exe.sig"
          )
          foreach ($pattern in $patterns) {
            Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue | Where-Object { -not $_.PSIsContainer } | ForEach-Object {
              $macosArch = $env:ARTIFACT -replace '^tauritube-macos-', ''
              $version = (Get-Content -LiteralPath src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
              $name = if ($_.Name -eq 'Tauritube.app.tar.gz') { "Tauritube_${version}_$macosArch.app.tar.gz" } elseif ($_.Name -eq 'Tauritube.app.tar.gz.sig') { "Tauritube_${version}_$macosArch.app.tar.gz.sig" } else { $_.Name }
              Copy-Item -LiteralPath $_.FullName -Destination "$out/$name" -Force
            }
          }

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/${{ matrix.artifact }}/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: tauri
    if: github.event_name != 'pull_request'
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Combine updater manifests
        shell: pwsh
        run: |
          $version = (Get-Content -LiteralPath src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $baseUrl = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:RELEASE_TAG"
          $files = [ordered]@{
            'windows-x86_64' = "Tauritube_${version}_x64-setup.exe"
            'linux-x86_64' = "Tauritube_${version}_amd64.AppImage"
            'linux-aarch64' = "Tauritube_${version}_aarch64.AppImage"
            'darwin-x86_64' = "Tauritube_${version}_x64.app.tar.gz"
            'darwin-aarch64' = "Tauritube_${version}_arm64.app.tar.gz"
          }
          $platforms = [ordered]@{}
          foreach ($entry in $files.GetEnumerator()) {
            $path = Join-Path release-artifacts $entry.Value
            $signaturePath = "$path.sig"
            if (!(Test-Path -LiteralPath $path) -or !(Test-Path -LiteralPath $signaturePath)) { throw "Missing updater artifact for $($entry.Key): $($entry.Value)" }
            $platforms[$entry.Key] = [ordered]@{ url = "$baseUrl/$($entry.Value)"; signature = (Get-Content -LiteralPath $signaturePath -Raw).Trim() }
          }
          $manifest = [ordered]@{ version = $version; notes = 'Automated build'; pub_date = (Get-Date).ToUniversalTime().ToString('o'); platforms = $platforms }
          $manifest | ConvertTo-Json -Depth 12 | Set-Content -LiteralPath release-artifacts/latest.json -Encoding utf8

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: Tauritube ${{ env.RELEASE_TAG }}
          body: Automated build from `${{ github.sha }}`.
          commit: ${{ github.sha }}
          artifacts: release-artifacts/*
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
